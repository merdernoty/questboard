syntax = "proto3";

package profile_service.order.v1;

option go_package = "profile-service/pkg/profile/v1;profileV1";

import "google/type/money.proto";
import "google/type/decimal.proto";
import "google/protobuf/timestamp.proto";


service ProfileService{
  // Получить информацию о профиле
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);

  // Получить список профилей
  rpc GetProfileList(GetProfileListRequest) returns (GetProfileListResponse);

  // Проверить доступные лимиты
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);

  // Создать профиль
  rpc CreateProfile(CreateProfileRequest) returns (CreateProfileResponse);
}

message GetProfileRequest {
  int64 user_id = 1;
}

message GetProfileResponse {
  int64 user_id = 1;
  string name = 2;
  string email = 3;

  Tariff tariff = 4;

  message Tariff {
    enum Enum{
      UNKNOWN = 0;
      BASE = 1;
      MAX = 2;
    }

    Enum tariff = 1;
  }
}

message GetProfileListRequest{
  repeated int64 user_ids = 1;
}

message GetProfileListResponse{
  repeated Profile profiles = 1;

  message Profile{
    int64 user_id = 1;
    string name = 2;
    string email = 3;
    bool is_task_allowed = 4;
  }
}

message CheckPermissionRequest {
  int64 user_id = 1;
}

message CheckPermissionResponse {
  bool allowed = 1;      // можно создать задачу?
}

message CreateProfileRequest{
  int64 user_id = 1;
  string name = 2;
  string email = 3;
  bool is_task_allowed = 4;
}

message CreateProfileResponse{}