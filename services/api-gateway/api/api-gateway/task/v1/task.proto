syntax = "proto3";

package api_gateway.task.v1;

option go_package = "api_gateway/pkg/task/v1;taskV1";

import "google/type/money.proto";
import "google/type/decimal.proto";
import "google/protobuf/timestamp.proto";

import "google/protobuf/duration.proto";
import "google/protobuf/wrappers.proto";

import "google/protobuf/struct.proto";

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Funny Tasks"
    description: "Task application"
    version: "1.0"
  }
};

service TaskService {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_tag) = {name: "task"};

  // Получить категории задач
  rpc GetCategories(GetCategoriesRequest) returns (GetCategoriesResponse) {
    option (google.api.http) = {
      get: "/v1/categories"
    };
  }

  // Создать задачу
  rpc CreateTask (CreateTaskRequest) returns (CreateTaskResponse){
    option (google.api.http) = {
      post: "/v1/task"
    };
  }

  // Получить задачу
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse){
    option (google.api.http) = {
      get: "/v1/task"
    };
  }

  // Получить задачи пользователя
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse){
    option (google.api.http) = {
      get: "/v1/task/list"
    };
  }
}

message GetCategoriesRequest{}

message GetCategoriesResponse{
  repeated Category categories = 1;

  message Category {
    string id = 1;
    string title = 2;
    string desc = 3;
    google.type.Money price = 4;
  }
}

message CreateTaskRequest {
  int64 user_id = 1;

  string category_id = 2;

  string comment = 3;
  google.protobuf.Duration execution_time =4;
}

message CreateTaskResponse {
  string task_id = 1;
  string status = 2;
  google.type.Money price = 3;
}

message GetTaskRequest{
  string task_id = 1;
}

message GetTaskResponse{
  string task_id = 1;

  string status = 2;
  // опциональный результат
  google.protobuf.Struct result = 3;

  google.type.Money price = 4;
}

message ListTasksRequest {
  int64 user_id = 1;
}

message ListTasksResponse {
  repeated Task tasks = 1;

  message Task {
    string task_id = 1;

    string status = 2;
    // опциональный результат
    google.protobuf.Struct result = 3;

    google.type.Money price = 4;
  }
}